<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>세계수 · 부유하는 차원</title>
<style>
  :root{--ink:#2c2b40;--ink-soft:#67658c;--panel:rgba(250,251,255,0.9);--line:rgba(120,120,170,0.22);}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#cfe0f7;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #title{position:fixed;top:26px;left:34px;z-index:5;pointer-events:none;text-shadow:0 2px 20px rgba(255,255,255,.6)}
  #title h1{margin:0;font-size:22px;letter-spacing:.26em;font-weight:700}
  #title p{margin:6px 0 0;font-size:12px;letter-spacing:.18em;color:var(--ink-soft)}
  #hint{position:fixed;bottom:22px;left:34px;z-index:5;pointer-events:none;font-size:12px;letter-spacing:.05em;
    color:var(--ink-soft);display:flex;gap:18px;text-shadow:0 1px 12px rgba(255,255,255,.8)}
  #hint b{color:var(--ink);font-weight:700}
  #panel{position:fixed;top:0;right:0;height:100%;width:410px;z-index:8;background:var(--panel);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid var(--line);
    box-shadow:-30px 0 90px rgba(70,70,130,.16);transform:translateX(100%);
    transition:transform .55s cubic-bezier(.22,.9,.3,1);padding:54px 40px;overflow-y:auto}
  #panel.open{transform:translateX(0)}
  #panel .tag{display:inline-block;font-size:11px;letter-spacing:.26em;padding:5px 12px;border-radius:20px;color:#fff;margin-bottom:16px}
  #panel h2{margin:0 0 4px;font-size:28px;font-weight:800}
  #panel .sub{margin:0 0 24px;font-size:12px;letter-spacing:.18em;color:var(--ink-soft)}
  #panel .body{font-size:14.5px;line-height:1.9;color:#413f60;white-space:pre-line}
  #panel .look{margin-top:20px;padding:16px 18px;border-radius:14px;background:rgba(120,120,180,.08);font-size:13px;line-height:1.8;color:#4a4870}
  #panel .look b{display:block;font-size:10.5px;letter-spacing:.24em;color:var(--ink-soft);margin-bottom:7px;font-weight:700}
  #panel .who{margin-top:24px;padding-top:22px;border-top:1px solid var(--line)}
  #panel .who h3{margin:0 0 12px;font-size:10.5px;letter-spacing:.24em;color:var(--ink-soft);font-weight:700}
  #panel .chip{display:flex;gap:10px;align-items:baseline;margin-bottom:9px}
  #panel .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;margin-top:6px}
  #panel .nm{font-weight:700;font-size:14px}.rl{font-size:12px;color:var(--ink-soft)}
  #close{position:absolute;top:20px;right:22px;width:34px;height:34px;border:none;background:rgba(120,120,170,.12);
    border-radius:50%;color:var(--ink);cursor:pointer;font-size:17px;line-height:34px}
  #close:hover{background:rgba(120,120,170,.24)}
  #load{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:#cfe0f7;transition:opacity .8s;font-size:13px;letter-spacing:.3em;color:#5a5f8c}
  #load.hide{opacity:0;pointer-events:none}
</style>

<div id="app"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" }}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const PI=Math.PI, TAU=PI*2, rnd=(a,b)=>a+Math.random()*(b-a), pick=a=>a[(Math.random()*a.length)|0];
const gltfLoader=new GLTFLoader();
const SOLO=new URLSearchParams(location.search).get('solo');   // ?solo=<id> : 해당 GLB만 로드(검사용)
// 구역별 AI 3D 모델(있으면 프로시저럴 대신 로드). 부채꼴 슬롯에 맞춰 배치.
// vizcom 등으로 만든 GLB를 assets/<id>.glb 로 넣고 여기 등록하면 해당 구역에 얹힘.
const ZONE_GLB={machine:'assets/machine.glb', sun:'assets/sun.glb', nature:'assets/nature.glb', fire:'assets/fire.glb', ice:'assets/ice.glb'};
// 수호자 구역들: 기계와 동일 높이(총 y≈58)로 상승. 각 zone cfg.h 를 감안해 oy 지정.
window.__machineTF={s:60, ry:55, r:106, oy:65};   // zone -7 → 총 58
window.__sunTF={s:48, ry:50, r:106, oy:49};        // zone 9 → 총 58 (+10%)
window.__natureTF={s:55, ry:15, r:106, oy:51};     // zone 7 → 총 58 (+10%)
window.__fireTF={s:21.6, ry:45, r:106, oy:62};     // zone -4 → 총 58 (+20%)
window.__iceTF={s:40, ry:45, r:108, oy:53};         // zone 5 → 총 58
function placeGLBWedge(zg,url,cA,cfg){   // cfg={tf,obj,apply} = window 키 이름
  gltfLoader.load(url,g=>{const o=g.scene;
    o.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;if(n.material)n.material.side=THREE.DoubleSide;}});
    const box=new THREE.Box3().setFromObject(o),ctr=new THREE.Vector3();box.getCenter(ctr);
    o.position.sub(ctr);                 // 바운딩박스 중심을 원점으로
    const holder=new THREE.Group(); holder.add(o); zg.add(holder);
    window[cfg.obj]=holder;
    window[cfg.apply]=()=>{const t=window[cfg.tf];holder.scale.setScalar(t.s);
      holder.rotation.y=-cA+PI+(t.ry||0)*PI/180;
      holder.position.set(Math.cos(cA)*t.r, t.oy||0, Math.sin(cA)*t.r);};
    window[cfg.apply]();
  },undefined,e=>console.warn('glb',url,e));
}
// 중심부(원)용: 이전에 생성한 벚꽃 세계수 섬 GLB를 중앙에 배치
function placeGLBCore(zg,url,size,sink){
  gltfLoader.load(url,g=>{const o=g.scene;
    o.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;if(n.material)n.material.side=THREE.DoubleSide;}});
    const box=new THREE.Box3().setFromObject(o),sz=new THREE.Vector3(),ctr=new THREE.Vector3();box.getSize(sz);box.getCenter(ctr);
    const s=size/Math.max(sz.x,sz.z); o.scale.setScalar(s);
    o.position.set(-ctr.x*s, -box.min.y*s - sink, -ctr.z*s); zg.add(o);
  },undefined,e=>console.warn('glb',url,e));
}
// 반달링(마계) GLB 배치 — 콘솔에서 window.__hellTF 조정 후 window.__applyHell() 로 정렬
// s=스케일, ry=Y회전(도), o*=오프셋. 마계/천계 반대편·동일 크기
window.__hellTF={s:58, ry:120, ox:-45, oy:9, oz:0};
window.__heavenTF={s:58, ry:300, ox:45, oy:9, oz:0};
function placeGLBHalf(zg,url,cfg){   // cfg={tf,obj,apply} = window 키 이름
  gltfLoader.load(url,g=>{const o=g.scene;
    o.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;if(n.material)n.material.side=THREE.DoubleSide;}});
    const box=new THREE.Box3().setFromObject(o),ctr=new THREE.Vector3();box.getCenter(ctr);
    o.position.sub(ctr);                 // 바운딩박스 중심을 원점으로
    const holder=new THREE.Group(); holder.add(o); zg.add(holder);
    window[cfg.obj]=holder;
    window[cfg.apply]=()=>{const t=window[cfg.tf];holder.scale.setScalar(t.s);holder.rotation.y=t.ry*PI/180;holder.position.set(t.ox,t.oy,t.oz);};
    window[cfg.apply]();
  },undefined,e=>console.warn('glb',url,e));
}
const updaters=[];

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xc2d6f2,0.0010);
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,0.1,4000);
camera.position.set(8,132,232);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.06;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setClearColor(0xcfe0f7,1);
document.getElementById('app').appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.06;
controls.minDistance=55; controls.maxDistance=780; controls.maxPolarAngle=PI*0.94; controls.target.set(0,8,0);

scene.add(new THREE.HemisphereLight(0xffffff,0xbcccee,1.0));
const sun=new THREE.DirectionalLight(0xfff2d8,1.5);
sun.position.set(120,220,70); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.near=20; sun.shadow.camera.far=680;
sun.shadow.camera.left=-200; sun.shadow.camera.right=200; sun.shadow.camera.top=200; sun.shadow.camera.bottom=-200;
sun.shadow.bias=-0.0004; scene.add(sun);
scene.add(new THREE.DirectionalLight(0xccdcff,0.35).translateX(-80).translateY(50).translateZ(-70));

/* 하늘 */{
  const m=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
    vertexShader:`varying vec3 vp;void main(){vp=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vp;void main(){float t=vp.y*.5+.5;vec3 top=vec3(0.42,0.60,0.92),mid=vec3(0.72,0.83,0.98),bot=vec3(0.93,0.96,0.99);
      gl_FragColor=vec4(mix(bot,mix(mid,top,smoothstep(.45,1.,t)),smoothstep(0.,.7,t)),1.);}`});
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1900,32,24),m));
}
function glowTex(hex){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);g.addColorStop(0,hex);g.addColorStop(.3,hex);g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);}
const soft=glowTex('#ffffff');
for(let i=0;i<22;i++){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:soft,transparent:true,opacity:rnd(.3,.55),depthWrite:false}));
  const a=rnd(0,TAU),r=rnd(320,820);s.position.set(Math.cos(a)*r,rnd(-140,180),Math.sin(a)*r);const sc=rnd(170,360);s.scale.set(sc,sc*.6,1);scene.add(s);}

/* ===== 재료·프리미티브 ===== */
function mat(c,o={}){return new THREE.MeshStandardMaterial({color:c,roughness:o.rough??.9,metalness:o.metal??0,
  flatShading:o.flat??false,emissive:new THREE.Color(o.emissive??0),emissiveIntensity:o.ei??1,
  transparent:o.transparent??false,opacity:o.opacity??1,side:o.side??THREE.FrontSide});}
function M(geo,material){const m=new THREE.Mesh(geo,material);m.castShadow=true;m.receiveShadow=true;return m;}
function inWedge(r0,r1,a0,a1){const a=rnd(a0,a1),r=Math.sqrt(rnd(r0*r0,r1*r1));return [Math.cos(a)*r,Math.sin(a)*r];}
// zg 로컬: 윗면 y=0. make 가 정한 y 는 보존, x/z 만 배치.
function scatter(zg,r0,r1,a0,a1,n,make){for(let i=0;i<n;i++){const[x,z]=inWedge(r0,r1,a0,a1);const o=make(i,x,z);if(o){o.position.x=x;o.position.z=z;zg.add(o);}}}
function points(zg,n,size,color,r0,r1,a0,a1,yfn,blend){const p=new Float32Array(n*3),base=[];for(let i=0;i<n;i++){const[x,z]=inWedge(r0,r1,a0,a1),y=yfn();p[i*3]=x;p[i*3+1]=y;p[i*3+2]=z;base.push(y);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(p,3));
  const pt=new THREE.Points(g,new THREE.PointsMaterial({size,map:soft,transparent:true,opacity:.9,depthWrite:false,color,blending:blend??THREE.AdditiveBlending}));
  pt.userData.base=base;zg.add(pt);return pt;}

/* ===== 부유 지형 몸체(바위 밑동) ===== */
// 부채꼴 섬: 윗면(바이옴) + 아래 바위 밑동
function floatWedge(zg,r0,r1,a0,a1,biome,rockC){
  const top=M(new THREE.RingGeometry(r0,r1,90,2,-a1,a1-a0),mat(biome,{rough:.95,emissive:biome,ei:.05}));
  top.rotation.x=-PI/2; zg.add(top);
  const area=(r1-r0)*(a1-a0), n1=Math.min(18,Math.max(7,Math.round(area/26)));
  for(let i=0;i<n1;i++){const[x,z]=inWedge(r0+1,r1-1,a0,a1),s=rnd(4.5,8);
    const rk=M(new THREE.DodecahedronGeometry(s,0),mat(rockC,{rough:1,flat:true}));rk.position.set(x,-s*.45,z);rk.rotation.set(rnd(0,PI),rnd(0,PI),rnd(0,PI));zg.add(rk);}
  const cA=(a0+a1)/2,mR=(r0+r1)/2;
  for(let i=0;i<5;i++){const t=i/5,s=rnd(6,11)*(1-t*.55);const rk=M(new THREE.DodecahedronGeometry(s,0),mat(rockC,{rough:1,flat:true}));
    const a=cA+rnd(-.25,.25)*(1-t*.5),r=mR+rnd(-10,10)*(1-t*.5);rk.position.set(Math.cos(a)*r,-6-t*15,Math.sin(a)*r);rk.rotation.set(rnd(0,PI),rnd(0,PI),rnd(0,PI));zg.add(rk);}
}
function floatCircle(zg,R,biome,rockC){
  const top=M(new THREE.CircleGeometry(R,96),mat(biome,{rough:.95,emissive:biome,ei:.05}));top.rotation.x=-PI/2;zg.add(top);
  for(let i=0;i<16;i++){const[x,z]=inWedge(2,R-1,0,TAU),s=rnd(5,9);const rk=M(new THREE.DodecahedronGeometry(s,0),mat(rockC,{rough:1,flat:true}));rk.position.set(x,-s*.45,z);rk.rotation.set(rnd(0,PI),rnd(0,PI),rnd(0,PI));zg.add(rk);}
  for(let i=0;i<7;i++){const t=i/7,s=rnd(7,12)*(1-t*.6);const rk=M(new THREE.DodecahedronGeometry(s,0),mat(rockC,{rough:1,flat:true}));const a=rnd(0,TAU),r=rnd(0,R*.5)*(1-t*.5);rk.position.set(Math.cos(a)*r,-6-t*18,Math.sin(a)*r);rk.rotation.set(rnd(0,PI),rnd(0,PI),rnd(0,PI));zg.add(rk);}
}

/* ===== 지형 오브젝트 빌더 ===== */
function worldTree(scale){const g=new THREE.Group();
  const trunk=M(new THREE.CylinderGeometry(1.5*scale,3.2*scale,13*scale,10),mat(0x5a2f28,{rough:.95}));trunk.position.y=6.5*scale;g.add(trunk);
  for(let i=0;i<5;i++){const a=i/5*TAU;const br=M(new THREE.CylinderGeometry(.5*scale,1.1*scale,7*scale,6),mat(0x5a2f28,{rough:.95}));
    br.position.set(Math.cos(a)*3*scale,12*scale,Math.sin(a)*3*scale);br.rotation.z=Math.cos(a)*.7;br.rotation.x=-Math.sin(a)*.7;g.add(br);}
  const leaf=mat(0xf3aeba,{rough:.85});
  [[0,17,0,8],[-6,15,3,5],[6,15,-3,5],[2,15,6,5],[-3,15,-6,5],[0,21,0,5.5]].forEach(([x,y,z,r])=>{const s=M(new THREE.IcosahedronGeometry(r*scale,1),leaf);s.position.set(x*scale,y*scale,z*scale);s.scale.y=.82;g.add(s);});
  return g;}
function cottage(scale){const g=new THREE.Group();
  const body=M(new THREE.BoxGeometry(3.2*scale,1.9*scale,2.7*scale),mat(0xcaa877,{rough:1}));body.position.y=.95*scale;g.add(body);
  const roof=M(new THREE.CylinderGeometry(.05,2.5*scale,1.3*scale,4),mat(0x7fb26a,{rough:1}));roof.rotation.y=PI/4;roof.position.y=2.5*scale;g.add(roof);return g;}
function broadTree(scale,leaf){const g=new THREE.Group();const t=M(new THREE.CylinderGeometry(.4*scale,.7*scale,2.4*scale,7),mat(0x5a4630));t.position.y=1.2*scale;g.add(t);
  [[0,3.4,0,2.1],[-1.4,3,.5,1.4],[1.4,3,-.4,1.4],[0,4,0,1.5]].forEach(([x,y,z,r])=>{const s=M(new THREE.IcosahedronGeometry(r*scale,1),mat(leaf,{rough:.82}));s.position.set(x*scale,y*scale,z*scale);g.add(s);});return g;}
function rock(scale,color,fl){return M(new THREE.DodecahedronGeometry(scale,0),mat(color,{rough:.95,flat:fl??true}));}
function crystal(scale,color,em){return M(new THREE.ConeGeometry(.4*scale,2.4*scale,5),mat(color,{rough:.3,metal:.1,emissive:em??color,ei:em?.7:.25,flat:true}));}
function gem(scale,color,em){return M(new THREE.OctahedronGeometry(scale,0),mat(color,{rough:.3,metal:.3,emissive:em??color,ei:.5,flat:true}));}
function mountain(scale,base,cap){const g=new THREE.Group();const h=rnd(7,12)*scale;
  const mtn=M(new THREE.ConeGeometry(rnd(3,4.6),h,7),mat(base,{rough:.92,flat:true}));mtn.position.y=h/2;g.add(mtn);
  const c=M(new THREE.ConeGeometry(rnd(1.5,2.2),h*.38,7),mat(cap,{rough:.8,flat:true}));c.position.y=h*.8;g.add(c);return g;}
function fence(scale){return M(new THREE.BoxGeometry(.28,1.5*scale,.28),mat(0xf1f1f5,{rough:.85}));}
function pool(r,color,o={}){const m=M(new THREE.CircleGeometry(r,26),mat(color,{rough:.15,metal:.2,emissive:o.em??color,ei:o.ei??.35,transparent:true,opacity:o.opacity??.92}));m.rotation.x=-PI/2;return m;}
function vineLine(a,b,color,sag){const mid=a.clone().add(b).multiplyScalar(.5);mid.y-=sag||2;
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.QuadraticBezierCurve3(a,mid,b).getPoints(12)),new THREE.LineBasicMaterial({color,transparent:true,opacity:.75}));}
function cathedral(scale){const g=new THREE.Group();const wall=mat(0xf1ecdd,{rough:.85}),roofc=mat(0xccd6e8,{rough:.7});
  const base=M(new THREE.BoxGeometry(6*scale,7*scale,9*scale),wall);base.position.y=3.5*scale;g.add(base);
  const sp=M(new THREE.ConeGeometry(2.1*scale,6*scale,6),roofc);sp.position.y=10*scale;g.add(sp);
  [[-3.4],[3.4]].forEach(([x])=>{const t=M(new THREE.CylinderGeometry(1.3*scale,1.3*scale,9*scale,6),wall);t.position.set(x*scale,4.5*scale,3.6*scale);g.add(t);
    const tc=M(new THREE.ConeGeometry(1.6*scale,3.4*scale,6),roofc);tc.position.set(x*scale,10.5*scale,3.6*scale);g.add(tc);});return g;}
function castle(scale){const g=new THREE.Group();const wall=mat(0x1b1520,{rough:.95}),dark=mat(0x120c16,{rough:1}),rgem=mat(0x9a1024,{rough:.3,metal:.3,emissive:0x8a0f1a,ei:.6});
  const base=M(new THREE.BoxGeometry(7.5*scale,7*scale,7.5*scale),wall);base.position.y=3.5*scale;g.add(base);
  [[-4,-4],[4,-4],[-4,4],[4,4]].forEach(([x,z])=>{const t=M(new THREE.CylinderGeometry(1.2*scale,1.5*scale,10*scale,6),wall);t.position.set(x*scale,5*scale,z*scale);g.add(t);
    const tc=M(new THREE.ConeGeometry(1.5*scale,3.6*scale,6),dark);tc.position.set(x*scale,11.4*scale,z*scale);g.add(tc);
    const gm=M(new THREE.OctahedronGeometry(.7*scale),rgem);gm.position.set(x*scale,10.4*scale,z*scale);g.add(gm);});
  const spire=M(new THREE.ConeGeometry(2.4*scale,6*scale,6),wall);spire.position.y=10*scale;g.add(spire);return g;}
function altar(scale){const g=new THREE.Group();const stone=mat(0xd6c48c,{rough:1}),white=mat(0xf3efdd,{rough:.65});
  for(let i=0;i<3;i++){const t=M(new THREE.CylinderGeometry((6-i*1.4)*scale,(6.6-i*1.4)*scale,1.6*scale,8),stone);t.position.y=(.8+i*1.5)*scale;g.add(t);}

  updaters.push(t=>{const p=du.geometry.attributes.position;for(let k=0;k<p.count;k++){p.setX(k,p.getX(k)+Math.sin(t*.4+k)*.008);p.setY(k,p.getY(k)+Math.cos(t*.3+k)*.005);}p.needsUpdate=true;});
  if(s===0)zoneLabel(z,'경계',META.border.color,(ED0+ED1)/2,(a0+a1)/2,22);
}

/* ===== 상호작용 ===== */
const ray=new THREE.Raycaster(),m=new THREE.Vector2();let hovered=null,panelOpen=false;
const RINGGROUPS=[coreG,innerG,guardG,borderG];
function getZone(o){while(o){if(o.userData&&o.userData.reg)return o;o=o.parent;}return null;}
function pointer(e){m.x=(e.clientX/innerWidth)*2-1;m.y=-(e.clientY/innerHeight)*2+1;}
addEventListener('mousemove',e=>{pointer(e);ray.setFromCamera(m,camera);const hit=ray.intersectObjects(RINGGROUPS,true).find(h=>getZone(h.object));
  hovered=hit?getZone(hit.object):null;renderer.domElement.style.cursor=hovered?'pointer':'grab';});
renderer.domElement.addEventListener('click',e=>{pointer(e);ray.setFromCamera(m,camera);const hit=ray.intersectObjects(RINGGROUPS,true).find(h=>getZone(h.object));
  if(hit)openPanel(getZone(hit.object).userData.reg);});
const panel=document.getElementById('panel');
function openPanel(reg){const col='#'+new THREE.Color(reg.color).getHexString();
  const T=document.getElementById('p-tag');T.textContent=reg.tag;T.style.background=col;T.style.color=luma(reg.color)>.6?'#2c2b40':'#fff';
  document.getElementById('p-title').textContent=reg.title;document.getElementById('p-sub').textContent=reg.sub;
  document.getElementById('p-body').textContent=reg.body;document.getElementById('p-look').innerHTML='<b>풍경 · LANDSCAPE</b>'+reg.look;
  document.getElementById('p-who').innerHTML='<h3>이 곳의 인물</h3>'+reg.who.map(([n,r,c])=>
    `<div class="chip"><span class="dot" style="background:#${new THREE.Color(c).getHexString()}"></span><span><span class="nm">${n}</span><br><span class="rl">${r}</span></span></div>`).join('');
  panel.classList.add('open');panelOpen=true;}
function luma(hex){const c=new THREE.Color(hex);return .299*c.r+.587*c.g+.114*c.b;}
document.getElementById('close').onclick=()=>{panel.classList.remove('open');panelOpen=false;};

window.__cam=camera;window.__controls=controls;window.__scene=scene;
window.__zoneBox=(id)=>{let found=null;scene.traverse(o=>{if(o.userData&&o.userData.reg&&o.userData.reg.id===id)found=o;});
  if(!found)return'none';let meshes=0;found.traverse(o=>{if(o.isMesh)meshes++;});const b=new THREE.Box3().setFromObject(found);
  return{meshes,min:[b.min.x|0,b.min.y|0,b.min.z|0],max:[b.max.x|0,b.max.y|0,b.max.z|0]};};
let spinEase=1,t=0,last=performance.now();
function animate(now){requestAnimationFrame(animate);const dt=Math.min((now-last)/1000,.05);last=now;t+=dt;
  spinEase+=((panelOpen?0:1)-spinEase)*.05;
  RINGS.forEach(r=>r.g.rotation.y+=dt*r.spd*spinEase);   // 링별 독립 회전
  updaters.forEach(u=>u(t));controls.update();renderer.render(scene,camera);}
requestAnimationFrame(animate);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
setTimeout(()=>document.getElementById('load').classList.add('hide'),700);
</script>
